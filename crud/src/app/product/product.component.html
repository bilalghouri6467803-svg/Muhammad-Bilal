<div class="container mt-4">
  <form [formGroup]="myReactiveForm" (ngSubmit)="onSubmit()">

    <div class="row">

      <!-- USER -->
      <div class="col-md-6 mb-3">
        <label class="form-label">User Name</label>
        <input type="text" class="form-control" formControlName="user" placeholder="Enter User Name">
      </div>

      <!-- EMAIL -->
      <div class="col-md-6 mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" formControlName="email" placeholder="Enter Email">
      </div>

    </div>

    <div class="row">
      <!-- AVAILABLE -->
      <div class="col-md-6 mb-3">
        <label class="form-label">Course</label>
        <select class="form-control" formControlName="course">
          <option value="" placeholder="Course">Select</option>
          <option value="Yes">HTML</option>
          <option value="No">CSS</option>
          <option value="No">JAVASCRIPT</option>
          <option value="No">ANULAR</option>
        </select>
      </div>
 <div class="mb-3">
  <label class="form-label">Gender</label><br>

  <div class="form-check form-check-inline">
    <input class="form-check-input" type="radio" formControlName="gender" value="Male" id="male">
    <label class="form-check-label" for="male">Male</label>
  </div>

  <div class="form-check form-check-inline">
    <input class="form-check-input" type="radio" formControlName="gender" value="Female" id="female">
    <label class="form-check-label" for="female">Female</label>
  </div>
</div>

    </div>
   <!-- BUTTONS -->
    <div class="text-center mt-3">
      <button class="btn btn-success me-2" type="submit">Submit</button>
      <button class="btn btn-danger" type="reset">Clear</button>
      <button class="btn btn-danger" type="reset" (click)="onSave()">save</button>
    </div>
 

  </form>
</div>
